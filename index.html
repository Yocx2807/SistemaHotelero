<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Hotelero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="#" id="btnDashboard">
                SH
            </a>

            <div class="navbar-nav">

                <button class="nav-btn" id="btnHoteles">Hoteles</button>

                <button class="nav-btn" id="btnSedes">Sedes</button>

                <button class="nav-btn" id="btnHabitaciones">Habitaciones</button>

                <button class="nav-btn" id="btnClientes">Clientes</button>

                <button class="nav-btn" id="btnReservaciones">Reservaciones</button>

                <button class="nav-btn" id="btnPagos">Pagos</button>

            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div id="contenido">

        </div>

    </div>

    <div class="modal fade" id="modalHotel" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Hotel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="idHotel">

                    <div id="mensajeHotel"></div>

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" id="nombreHotel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Descripción</label>
                        <input type="text" id="descripcionHotel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Teléfono</label>
                        <input type="text" id="telefonoHotel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Correo</label>
                        <input type="email" id="correoHotel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Sitio Web</label>
                        <input type="text" id="sitioWebHotel" class="form-control">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button class="btn btn-dark" id="btnGuardarHotel">
                        Guardar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEliminarHotel" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Eliminar Hotel</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="idHotelEliminar">

                <p class="mb-0">
                    ¿Está segura de que desea eliminar este hotel?
                </p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button class="btn btn-dark" id="btnConfirmarEliminarHotel">
                    Eliminar
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
